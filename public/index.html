<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEFO 📦</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; }
        form { background: #fff; padding: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; cursor: pointer; font-weight: bold; }
        .btn-scan { background-color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2980b9; color: white; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>FEFO 📦</h1>
    <p class="subtitle">First Expired, First Out - Priorité aux produits à écouler</p>

    <form id="form-produit">
        <h3>Enregistrer un Produit</h3>
        <button type="button" class="btn-scan">Annuler le scan</button>
        <input type="text" id="nom" placeholder="Nom du produit (ex: Sac de luxe)" required>
        <input type="text" id="codeBarres" placeholder="Code barres" required>
        <input type="text" id="emplacement" placeholder="Emplacement" required>
        <label>Date d'expiration / Vente limite :</label>
        <input type="date" id="dateExpiration" required>
        <button type="submit">Ajouter au Stock (FEFO)</button>
    </form>

    <table>
        <thead>
            <tr><th>Priorité</th><th>Nom</th><th>Code Barres</th><th>Emplacement</th><th>Date Limite</th><th>Actions</th></tr>
        </thead>
        <tbody id="table-corps"></tbody>
    </table>

    <script>
        const API_URL = '/produits';

        async function chargerStock() {
            const res = await fetch(API_URL);
            const produits = await res.json();
            const corps = document.getElementById('table-corps');
            corps.innerHTML = produits.map((p, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${p.nom}</td>
                    <td>${p.codeBarres}</td>
                    <td>${p.emplacement}</td>
                    <td>${p.dateExpiration}</td>
                    <td><button class="btn-delete" onclick="supprimer('${p.id}')">Sortir du Stock</button></td>
                </tr>
            `).join('');
        }

        document.getElementById('form-produit').onsubmit = async (e) => {
            e.preventDefault();
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nom: document.getElementById('nom').value,
                    codeBarres: document.getElementById('codeBarres').value,
                    emplacement: document.getElementById('emplacement').value,
                    dateExpiration: document.getElementById('dateExpiration').value
                })
            });
            document.getElementById('form-produit').reset();
            chargerStock();
        };

        async function supprimer(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            chargerStock();
        }

        chargerStock();
    </script>
</body>
</html>
